<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - Premium UI</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #ff4b1f;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #1a202c;
            --text-light: #718096;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(102, 126, 234, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(118, 75, 162, 0.15) 0px, transparent 50%);
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }

        /* الحاوية الرئيسية - شكل بطاقة عائمة */
        .app-wrapper {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: var(--card-bg);
            border-radius: 35px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* الهيدر - التصميم المذهل */
        .header {
            background: var(--primary-gradient);
            padding: 40px 30px 60px; /* Padding عالي لجعل الهيدر بارزاً */
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* دوائر خلفية زخرفية في الهيدر */
        .header::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bot-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .header-text h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 5px;
            backdrop-filter: blur(5px);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            box-shadow: 0 0 8px #48bb78;
        }

        .header-actions button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            backdrop-filter: blur(5px);
        }
        .header-actions button:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }

        /* منطقة الشات */
        .chat-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1h2v2H1V1zm4 0h2v2H5V1zm4 0h2v2H9V1zm4 0h2v2h-2V1zm4 0h2v2h-2V1zm-16 4h2v2H1V5zm4 0h2v2H5V5zm4 0h2v2H9V5zm4 0h2v2h-2V5zm4 0h2v2h-2V5zM1 9h2v2H1V9zm4 0h2v2H5V9zm4 0h2v2H9V9zm4 0h2v2h-2V9zm4 0h2v2h-2V9zM1 13h2v2H1v-2zm4 0h2v2H5v-2zm4 0h2v2H9v-2zm4 0h2v2h-2v-2zm4 0h2v2h-2v-2z' fill='%23cbd5e0' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
            padding-bottom: 100px; /* مساحة للـ Input العائم */
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 85%;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .bubble {
            padding: 16px 22px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .message.bot .bubble {
            background: #ffffff;
            color: var(--text-dark);
            border: 1px solid #edf2f7;
            border-bottom-right-radius: 4px;
        }

        .message.user .bubble {
            background: var(--primary-gradient);
            color: white;
            border-bottom-left-radius: 4px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        /* منطقة الإدخال العائمة */
        .input-container {
            position: absolute;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            z-index: 100;
        }

        .input-wrapper { flex: 1; display: flex; align-items: center; background: #f7f9fc; border-radius: 20px; padding: 5px 15px; margin-left: 10px; transition: 0.3s; }
        .input-wrapper:focus-within { background: white; box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1); }

        input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            color: var(--text-dark);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 20px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }

        .category-badge {
            display: inline-block;
            background: #ebf4ff;
            color: #4299e1;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 5px;
            font-weight: 700;
        }
        .message.user .category-badge { background: rgba(255,255,255,0.2); color: white; }

        .typing-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            background: #cbd5e0;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Scrollbar */
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- Header الجديد والجميل -->
    <header class="header">
        <div class="header-content">
            <div class="bot-profile">
                <div class="avatar-circle">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="header-text">
                    <h1>مساعد الشبكات</h1>
                    <div class="status-pill">
                        <div class="online-dot"></div>
                        <span>متصل الآن</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button onclick="toggleSound()" title="الصوت"><i class="fas fa-volume-up" id="soundIcon"></i></button>
                <button onclick="toggleTheme()" title="الخيارات"><i class="fas fa-ellipsis-v"></i></button>
            </div>
        </div>
    </header>

    <!-- منطقة الشات -->
    <div class="chat-area" id="chatArea">
        <!-- الرسائل ستظهر هنا -->
    </div>

    <!-- Input العائم -->
    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." disabled autocomplete="off">
        </div>
        <button id="sendBtn" class="send-btn" disabled><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // الصوت
    let isSoundOn = true;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (!isSoundOn) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'sent') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'received') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    function toggleSound() {
        isSoundOn = !isSoundOn;
        const icon = document.getElementById('soundIcon');
        if (isSoundOn) {
            icon.className = 'fas fa-volume-up';
        } else {
            icon.className = 'fas fa-volume-mute';
        }
    }

    // منطق البيانات
    const DB_URL = "https://script.google.com/macros/s/AKfycbyCKi3ix9w5uulvq29n8fCRoIXMwv4X2FKQoahDHYScR5kQEn__2He6hmObMgfjXPg/exec";

    let qaDatabase = [];
    let fuse;
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    async function loadData() {
        try {
            const response = await fetch(DB_URL);
            const data = await response.json();
            qaDatabase = data;
            
            const fuseOptions = { keys: ['q'], threshold: 0.3 }; 
            fuse = new Fuse(qaDatabase, fuseOptions);

            chatArea.innerHTML = '';
            
            // رسالة ترحيب معقولة
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message bot';
            welcomeDiv.innerHTML = `
                <div class="bubble">
                    <div class="category-badge">أهلاً بك</div>
                    مرحباً! 👋 أنا هنا لمساعدتك في أسئلة الشبكات.<br>سألني عن أي شيء.
                </div>
            `;
            chatArea.appendChild(welcomeDiv);

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        } catch (error) {
            chatArea.innerHTML = '';
            addMessage("حدث خطأ في الاتصال بالخادم ❌", 'bot');
        }
    }

    function addMessage(text, sender, category = null) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        
        let html = '';
        if (category) html += `<div class="category-badge">${category}</div>`;
        html += text;
        
        if (sender === 'bot') {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            html += `<div class="meta-info">${timeStr}</div>`;
        }
        
        div.innerHTML = `<div class="bubble">${html}</div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.id = 'typingRow';
        div.className = 'message bot';
        div.innerHTML = `
            <div class="bubble">
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const typingRow = document.getElementById('typingRow');
        if (typingRow) typingRow.remove();
    }

    function handleSearch() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        playSound('sent');
        userInput.value = '';

        showTyping();

        setTimeout(() => {
            removeTyping();
            const results = fuse.search(text);

            if (results.length > 0) {
                const bestMatch = results[0];
                playSound('received');
                addMessage(bestMatch.item.a, 'bot', bestMatch.item.category);
            } else {
                playSound('received');
                addMessage("عذراً، ليس لدي إجابة على هذا السؤال حالياً.", 'bot');
            }
        }, 600);
    }

    function toggleTheme() {
        // زر تجريبي للخيارات
        alert("التصميم الحالي هو الإصدار النهائي الأنيق!");
    }

    sendBtn.addEventListener('click', () => handleSearch());
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
    window.onload = loadData;
</script>

</body>
</html>
