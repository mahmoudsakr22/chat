<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --user-msg-bg: #667eea;
            --bot-msg-bg: #ffffff;
            --bg-color: #eef2f5;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg-color); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; transition: background 0.3s; }
        body.dark-mode { --bg-color: #1a1a1a; --bot-msg-bg: #2d2d2d; color: #fff; }

        .container { width: 100%; max-width: 500px; height: 95vh; background: #fff; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        body.dark-mode .container { background: #222; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }

        header { background: var(--primary-gradient); color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; }
        .header-info { display: flex; align-items: center; gap: 12px; }
        .header-avatar { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid rgba(255,255,255,0.3); }
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px; }
        .status-dot { width: 8px; height: 8px; background-color: #00e676; border-radius: 50%; box-shadow: 0 0 5px #00e676; }

        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background-image: radial-gradient(#e5e5e5 1px, transparent 1px); background-size: 20px 20px; }
        body.dark-mode .chat-area { background-image: radial-gradient(#444 1px, transparent 1px); }

        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { background: rgba(102, 126, 234, 0.1); color: #667eea; border: 1px solid #667eea; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .chip:hover { background: #667eea; color: white; transform: translateY(-2px); }

        .message-row { display: flex; align-items: flex-end; gap: 10px; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-row.user { flex-direction: row-reverse; }

        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .message-row.user .msg-avatar { background: #667eea; color: white; }
        .message-row.bot .msg-avatar { background: #fff; color: #764ba2; border: 1px solid #eee; }
        body.dark-mode .message-row.bot .msg-avatar { background: #333; border-color: #444; }

        .bubble { max-width: 75%; padding: 12px 18px; border-radius: 18px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.95rem; line-height: 1.5; }
        .message-row.user .bubble { background: var(--user-msg-bg); color: white; border-bottom-left-radius: 4px; }
        .message-row.bot .bubble { background: var(--bot-msg-bg); color: inherit; border-bottom-right-radius: 4px; border: 1px solid rgba(0,0,0,0.05); }
        body.dark-mode .message-row.bot .bubble { border-color: #444; }

        .time { font-size: 0.65rem; opacity: 0.7; margin-top: 5px; display: block; text-align: left; }
        .message-row.user .time { text-align: right; }
        .category-tag { display: inline-block; font-size: 0.65rem; padding: 2px 8px; background: rgba(0,0,0,0.05); border-radius: 4px; margin-bottom: 5px; color: #666; font-weight: 600; }
        .message-row.user .category-tag { background: rgba(255,255,255,0.2); color: white; }

        .typing-indicator { display: flex; gap: 4px; padding: 5px 0; }
        .typing-dot { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .input-area { padding: 15px; background: #fff; border-top: 1px solid #f0f0f0; display: flex; gap: 10px; align-items: center; }
        body.dark-mode .input-area { background: #222; border-top-color: #333; }

        .input-wrapper { flex: 1; position: relative; }
        input { width: 100%; padding: 14px 50px 14px 20px; border: 1px solid #e0e0e0; border-radius: 30px; background: #f8f9fa; font-family: inherit; font-size: 0.95rem; transition: all 0.3s ease; outline: none; }
        body.dark-mode input { background: #333; border-color: #444; color: white; }
        input:focus { background: #fff; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        
        button { width: 50px; height: 50px; background: var(--primary-gradient); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 1.1rem; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(118, 75, 162, 0.3); }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #ccc; box-shadow: none; }

        .theme-toggle { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: white; opacity: 0.8; }
        .sound-toggle { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: white; opacity: 0.8; margin-left: 10px; }

        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        body.dark-mode .chat-area::-webkit-scrollbar-thumb { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-info">
            <div class="header-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <h2 style="margin: 0; font-size: 1.1rem;">المساعد الذكي</h2>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>متصل</span>
                </div>
            </div>
        </div>
        <div>
            <button class="sound-toggle" onclick="toggleSound()" title="الصوت"><i class="fas fa-volume-up" id="soundIcon"></i></button>
            <button class="theme-toggle" onclick="toggleTheme()" title="المظهر"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="chat-area" id="chatArea">
        <!-- سيتم التحميل هنا -->
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." disabled autocomplete="off">
        </div>
        <button id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // إعدادات الصوت
    let isSoundOn = true;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (!isSoundOn) return;
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'sent') {
            // صوت إرسال (موجة سينية مرتفعة قصيرة)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'received') {
            // صوت استلام (نغمتين لطيفة)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    function toggleSound() {
        isSoundOn = !isSoundOn;
        const icon = document.getElementById('soundIcon');
        if (isSoundOn) {
            icon.className = 'fas fa-volume-up';
        } else {
            icon.className = 'fas fa-volume-mute';
        }
    }

    // بقية الكود
    const DB_URL = "https://script.google.com/macros/s/AKfycbyCKi3ix9w5uulvq29n8fCRoIXMwv4X2FKQoahDHYScR5kQEn__2He6hmObMgfjXPg/exec";

    let qaDatabase = [];
    let fuse;
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // أزرار الاقتراحات
    const suggestions = ["كلمة سر console", "اسم السويتش", "ما هو الـ IP؟", "SSH settings"];

    async function loadData() {
        try {
            const response = await fetch(DB_URL);
            const data = await response.json();
            qaDatabase = data;
            fuse = new Fuse(qaDatabase, { keys: ['q'], threshold: 0.4 });

            chatArea.innerHTML = '';
            
            // رسالة ترحيب بسيطة ومرحبة
            addMessage("أهلاً بك! 👋<br>أنا مساعدك الذكي، جرب أن تسألني عن أي شيء.", 'bot', null, null, true); 

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        } catch (error) {
            chatArea.innerHTML = '';
            addMessage("حدث خطأ في الاتصال بالخادم ❌", 'bot');
        }
    }

    function addMessage(text, sender, category = null, debugText = null, isWelcome = false) {
        const rowDiv = document.createElement('div');
        rowDiv.className = `message-row ${sender}`;
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'msg-avatar';
        avatarDiv.innerHTML = sender === 'bot' ? '<i class="fas fa-robot"></i>' : '<i class="fas fa-user"></i>';

        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = 'bubble';
        
        let html = '';
        if (category) html += `<div class="category-tag">${category}</div>`;
        html += text;
        
        if (sender === 'bot') {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            html += `<span class="time">${timeStr}</span>`;
        }
        
        bubbleDiv.innerHTML = html;

        rowDiv.appendChild(avatarDiv);
        rowDiv.appendChild(bubbleDiv);
        chatArea.appendChild(rowDiv);

        // إضافة أزرار الاقتراحات إذا كانت رسالة ترحيب
        if (isWelcome) {
            const suggestionsDiv = document.createElement('div');
            suggestionsDiv.className = 'suggestions';
            suggestions.forEach(q => {
                const btn = document.createElement('button');
                btn.className = 'chip';
                btn.innerText = q;
                btn.onclick = () => handleSearch(q); 
                suggestionsDiv.appendChild(btn);
            });
            rowDiv.appendChild(suggestionsDiv);
        }

        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const rowDiv = document.createElement('div');
        rowDiv.id = 'typingRow';
        rowDiv.className = 'message-row bot';
        rowDiv.innerHTML = `
            <div class="msg-avatar"><i class="fas fa-robot"></i></div>
            <div class="bubble">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        `;
        chatArea.appendChild(rowDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
        const typingRow = document.getElementById('typingRow');
        if (typingRow) typingRow.remove();
    }

    function handleSearch(forceText = null) {
        const text = forceText || userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        playSound('sent'); // صوت الإرسال
        userInput.value = '';

        showTyping();

        setTimeout(() => {
            removeTyping();
            const results = fuse.search(text);

            if (results.length > 0) {
                const bestMatch = results[0];
                playSound('received'); // صوت الاستلام
                addMessage(bestMatch.item.a, 'bot', bestMatch.item.category); // عرض بدون معلومات التصحيح
            } else {
                playSound('received');
                // رد عام بدلاً من قائمة الأسئلة
                addMessage("عذراً، ليس لدي إجابة على هذا السؤال حالياً. حاول أن تسأل بطريقة أخرى.", 'bot');
            }
        }, 600);
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const icon = document.querySelector('.theme-toggle i');
        icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    sendBtn.addEventListener('click', () => handleSearch());
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
    window.onload = loadData;
</script>

</body>
</html>
