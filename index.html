<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المساعد الذكي</title>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --c1:#00F0FF;   /* سيان */
  --c2:#7B5EF8;   /* بنفسجي */
  --c3:#FF2E78;   /* وردي نيون */
  --c4:#00E5A0;   /* أخضر زمردي */
  --dark:#04060F;
  --glass-bg:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.10);
  --glass-blur:18px;
  --text:#EEF2FF;
  --text-dim:#7A85A8;
  --user-glow:rgba(0,240,255,0.35);
  --bot-glow:rgba(123,94,248,0.20);
  --r-full:9999px;
  --r-lg:22px;
  --r-md:16px;
}

html,body{
  height:100%;
  height:-webkit-fill-available;
  font-family:'IBM Plex Sans Arabic',sans-serif;
  background:var(--dark);
  color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ══ AMBIENT ORBS ═══════════════════════════════════════ */
.orbs{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;overflow:hidden;
}

.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.55;
  animation:drift linear infinite;
}

.orb-1{
  width:420px;height:420px;
  background:radial-gradient(circle,var(--c1),transparent 70%);
  top:-120px;right:-100px;
  animation-duration:18s;
  animation-name:drift1;
}
.orb-2{
  width:380px;height:380px;
  background:radial-gradient(circle,var(--c2),transparent 70%);
  bottom:-80px;left:-80px;
  animation-duration:22s;
  animation-name:drift2;
}
.orb-3{
  width:280px;height:280px;
  background:radial-gradient(circle,var(--c3),transparent 70%);
  top:45%;left:50%;
  transform:translate(-50%,-50%);
  animation-duration:26s;
  animation-name:drift3;
  opacity:0.30;
}
.orb-4{
  width:200px;height:200px;
  background:radial-gradient(circle,var(--c4),transparent 70%);
  bottom:20%;right:5%;
  animation-duration:20s;
  animation-name:drift4;
  opacity:0.35;
}

@keyframes drift1{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(-40px,60px)}
  66%{transform:translate(30px,-40px)}
}
@keyframes drift2{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(50px,-50px)}
  66%{transform:translate(-30px,30px)}
}
@keyframes drift3{
  0%,100%{transform:translate(-50%,-50%)}
  50%{transform:translate(-50%,calc(-50% + 60px))}
}
@keyframes drift4{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(-40px,-30px)}
}

/* ══ SHELL ═══════════════════════════════════════════════ */
.shell{
  position:relative;z-index:1;
  width:100%;max-width:460px;
  height:100%;height:100dvh;
  margin:0 auto;
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* Thin rainbow border on shell */
.shell::before{
  content:'';
  position:absolute;inset:0;
  border-radius:0;
  background:linear-gradient(160deg,
    rgba(0,240,255,0.12) 0%,
    rgba(123,94,248,0.08) 40%,
    rgba(255,46,120,0.10) 100%);
  pointer-events:none;z-index:0;
}

@media(min-width:460px){
  body{display:flex;align-items:center;justify-content:center}
  .shell{height:92vh;max-height:880px;border-radius:28px;overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,0.06),
               0 32px 80px rgba(0,0,0,0.7),
               0 0 60px rgba(0,240,255,0.08);}
}

/* ══ HEADER ══════════════════════════════════════════════ */
header{
  flex-shrink:0;
  position:relative;z-index:10;
  background:rgba(4,6,15,0.65);
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  padding:0 16px;
  height:66px;
  display:flex;align-items:center;justify-content:space-between;
}

header::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--c1) 25%,
    var(--c2) 60%,
    var(--c3) 85%,
    transparent 100%);
  opacity:0.55;
}

.h-left{display:flex;align-items:center;gap:12px}

.avatar-wrap{position:relative}

.avatar{
  width:42px;height:42px;border-radius:14px;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;
  box-shadow:0 0 0 1px rgba(0,240,255,0.4),
             0 0 16px rgba(0,240,255,0.25);
}

.online-dot{
  position:absolute;bottom:-2px;left:-2px;
  width:11px;height:11px;border-radius:50%;
  background:var(--c4);
  border:2px solid var(--dark);
  box-shadow:0 0 6px var(--c4);
  animation:pulse-dot 2s ease infinite;
}
@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 6px var(--c4)}
  50%{box-shadow:0 0 14px var(--c4)}
}

.h-title{font-size:0.98rem;font-weight:700;letter-spacing:-0.01em;
  background:linear-gradient(90deg,#fff,rgba(200,210,255,0.8));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.h-sub{
  font-size:0.70rem;font-weight:500;margin-top:2px;
  color:var(--c4);letter-spacing:0.03em;
}

.h-actions{display:flex;align-items:center;gap:6px}

.icon-btn{
  width:34px;height:34px;border:none;cursor:pointer;
  border-radius:10px;font-size:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.6);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s ease;
  backdrop-filter:blur(8px);
}
.icon-btn:hover{
  background:rgba(255,255,255,0.12);
  color:#fff;
  border-color:rgba(255,255,255,0.18);
  box-shadow:0 0 12px rgba(0,240,255,0.15);
}

/* ══ CHAT BODY ═══════════════════════════════════════════ */
.chat-body{
  flex:1;
  overflow-y:auto;overflow-x:hidden;
  padding:18px 14px 10px;
  display:flex;flex-direction:column;gap:8px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  position:relative;z-index:1;
}

.chat-body::-webkit-scrollbar{width:3px}
.chat-body::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.08);border-radius:2px}

/* ══ WELCOME CARD ════════════════════════════════════════ */
.welcome-card{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:var(--r-lg);
  padding:26px 20px;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.3),
             inset 0 1px 0 rgba(255,255,255,0.07);
  animation:cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes cardIn{
  from{opacity:0;transform:scale(0.92) translateY(16px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.welcome-icon{
  width:60px;height:60px;border-radius:20px;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:#fff;
  margin:0 auto 16px;
  box-shadow:0 0 30px rgba(0,240,255,0.4),
             0 8px 20px rgba(0,0,0,0.3);
}

.welcome-card h2{
  font-size:1.05rem;font-weight:700;margin-bottom:8px;
  background:linear-gradient(90deg,#fff 40%,var(--c1));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.welcome-card p{
  font-size:0.84rem;color:var(--text-dim);line-height:1.65;
}

/* ══ DATE DIVIDER ════════════════════════════════════════ */
.divider{
  display:flex;align-items:center;gap:10px;
  color:var(--text-dim);font-size:0.70rem;
  padding:4px 0 8px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:rgba(255,255,255,0.06);
}

/* ══ MESSAGE ROW ══════════════════════════════════════════ */
.msg-row{
  display:flex;align-items:flex-end;gap:8px;
  animation:msgIn 0.30s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(14px) scale(0.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.msg-row.user{flex-direction:row-reverse}

.msg-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;margin-bottom:2px;
}

.msg-row.bot .msg-av{
  background:rgba(123,94,248,0.15);
  border:1px solid rgba(123,94,248,0.35);
  color:var(--c2);
  box-shadow:0 0 10px rgba(123,94,248,0.2);
}

.msg-row.user .msg-av{
  background:rgba(0,240,255,0.12);
  border:1px solid rgba(0,240,255,0.35);
  color:var(--c1);
  box-shadow:0 0 10px rgba(0,240,255,0.2);
}

/* ══ BUBBLE ══════════════════════════════════════════════ */
.bwrap{display:flex;flex-direction:column;max-width:80%}
.msg-row.user .bwrap{align-items:flex-end}
.msg-row.bot  .bwrap{align-items:flex-start}

.bubble{
  padding:11px 16px;
  border-radius:var(--r-md);
  font-size:0.92rem;line-height:1.65;
  word-break:break-word;
  position:relative;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

/* BOT bubble — glass silver */
.msg-row.bot .bubble{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.11);
  color:var(--text);
  border-bottom-right-radius:4px;
  box-shadow:0 4px 20px rgba(0,0,0,0.25),
             inset 0 1px 0 rgba(255,255,255,0.08),
             0 0 0 1px rgba(123,94,248,0.08);
}

/* USER bubble — glass cyan */
.msg-row.user .bubble{
  background:linear-gradient(135deg,
    rgba(0,240,255,0.18),
    rgba(0,240,255,0.09));
  border:1px solid rgba(0,240,255,0.30);
  color:#fff;
  border-bottom-left-radius:4px;
  box-shadow:0 4px 24px rgba(0,240,255,0.15),
             inset 0 1px 0 rgba(255,255,255,0.12),
             0 0 0 1px rgba(0,240,255,0.10);
  text-shadow:0 1px 4px rgba(0,0,0,0.3);
}

.bmeta{
  display:flex;align-items:center;gap:7px;
  margin-top:5px;padding:0 3px;
}
.msg-row.user .bmeta{flex-direction:row-reverse}

.msg-time{font-size:0.66rem;color:var(--text-dim)}

.cat-tag{
  font-size:0.63rem;font-weight:700;letter-spacing:0.04em;
  padding:2px 9px;border-radius:var(--r-full);
  background:rgba(0,229,160,0.12);
  color:var(--c4);
  border:1px solid rgba(0,229,160,0.25);
}

/* ══ TYPING ══════════════════════════════════════════════ */
.typing-bub{
  padding:14px 18px;border-radius:var(--r-md);
  border-bottom-right-radius:4px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.11);
  backdrop-filter:blur(14px);
  display:flex;gap:5px;align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--c2);
  animation:dotB 1.4s infinite ease-in-out both;
  box-shadow:0 0 6px var(--c2);
}
.dot:nth-child(1){animation-delay:-0.32s}
.dot:nth-child(2){animation-delay:-0.16s}
@keyframes dotB{
  0%,80%,100%{transform:scale(0.4);opacity:0.4}
  40%{transform:scale(1);opacity:1}
}

/* ══ INPUT BAR ═══════════════════════════════════════════ */
.input-bar{
  flex-shrink:0;
  position:relative;z-index:10;
  background:rgba(4,6,15,0.70);
  backdrop-filter:blur(var(--glass-blur));
  -webkit-backdrop-filter:blur(var(--glass-blur));
  border-top:1px solid rgba(255,255,255,0.07);
  padding:10px 14px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:10px;
}

.input-bar::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent,var(--c2),var(--c1),transparent);
  opacity:0.3;
}

.input-pill{
  flex:1;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:var(--r-full);
  display:flex;align-items:center;
  padding:0 16px;
  transition:border-color 0.25s, box-shadow 0.25s, background 0.25s;
  overflow:hidden;
}

.input-pill:focus-within{
  background:rgba(255,255,255,0.08);
  border-color:rgba(0,240,255,0.5);
  box-shadow:0 0 0 3px rgba(0,240,255,0.10),
             0 0 20px rgba(0,240,255,0.08);
}

.input-pill input{
  flex:1;border:none;background:transparent;outline:none;
  font-family:inherit;font-size:0.92rem;color:var(--text);
  padding:13px 0;direction:rtl;min-width:0;
  caret-color:var(--c1);
}
.input-pill input::placeholder{color:var(--text-dim)}

.send-btn{
  width:46px;height:46px;border:none;border-radius:50%;
  cursor:pointer;flex-shrink:0;font-size:16px;color:#fff;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s, box-shadow 0.2s;
  box-shadow:0 0 20px rgba(0,240,255,0.4),
             0 4px 12px rgba(0,0,0,0.3);
}
.send-btn:hover{transform:scale(1.07);
  box-shadow:0 0 28px rgba(0,240,255,0.55),0 4px 16px rgba(0,0,0,0.3)}
.send-btn:active{transform:scale(0.93)}
.send-btn:disabled{
  background:rgba(255,255,255,0.08);
  box-shadow:none;color:var(--text-dim);cursor:default}

/* ══ LOADER / ERROR ═══════════════════════════════════════ */
.center-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:16px;text-align:center;
  padding:24px;
}

.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,0.07);
  border-top-color:var(--c1);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  box-shadow:0 0 14px rgba(0,240,255,0.3);
}
@keyframes spin{to{transform:rotate(360deg)}}

.retry-btn{
  padding:10px 26px;background:linear-gradient(135deg,var(--c1),var(--c2));
  color:#fff;border:none;border-radius:var(--r-full);
  font-family:inherit;font-size:0.88rem;font-weight:600;
  cursor:pointer;box-shadow:0 0 20px rgba(0,240,255,0.3);
  transition:transform 0.2s,box-shadow 0.2s;
}
.retry-btn:hover{transform:scale(1.04);box-shadow:0 0 28px rgba(0,240,255,0.45)}
</style>
</head>
<body>

<!-- خلفية الإضاءة -->
<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="h-left">
      <div class="avatar-wrap">
        <div class="avatar"><i class="fas fa-robot"></i></div>
        <div class="online-dot"></div>
      </div>
      <div>
        <div class="h-title">المساعد الذكي</div>
        <div class="h-sub">● متصل الآن</div>
      </div>
    </div>
    <div class="h-actions">
      <button class="icon-btn" onclick="toggleSound()" title="الصوت">
        <i class="fas fa-volume-up" id="soundIcon"></i>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="المظهر" id="themeBtn">
        <i class="fas fa-sun"></i>
      </button>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat-body" id="chatArea"></div>

  <!-- INPUT -->
  <div class="input-bar">
    <div class="input-pill">
      <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." disabled autocomplete="off"/>
    </div>
    <button class="send-btn" id="sendBtn" disabled>
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

</div>

<script>
/* ── AUDIO ──────────────────────────────────────────────── */
let soundOn = true;
let audioCtx;

function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type){
  if(!soundOn) return;
  try{
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if(type==='sent'){
      osc.type='sine';
      osc.frequency.setValueAtTime(700,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(350,ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.07,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.13);
      osc.start(); osc.stop(ctx.currentTime+0.13);
    } else {
      osc.type='sine';
      osc.frequency.setValueAtTime(420,ctx.currentTime);
      osc.frequency.setValueAtTime(680,ctx.currentTime+0.1);
      gain.gain.setValueAtTime(0.07,ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);
      osc.start(); osc.stop(ctx.currentTime+0.3);
    }
  } catch(e){}
}

function toggleSound(){
  soundOn = !soundOn;
  document.getElementById('soundIcon').className = soundOn
    ? 'fas fa-volume-up' : 'fas fa-volume-mute';
}

/* ── THEME TOGGLE (light accent mode) ───────────────────── */
let isLight = false;
function toggleTheme(){
  isLight = !isLight;
  document.documentElement.style.setProperty('--dark', isLight ? '#0A0E1A' : '#04060F');
  document.documentElement.style.setProperty('--glass-bg', isLight
    ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.04)');
  const btn = document.getElementById('themeBtn');
  btn.querySelector('i').className = isLight ? 'fas fa-moon' : 'fas fa-sun';
  // shift orb colors subtly
  document.querySelector('.orb-1').style.opacity = isLight ? '0.4' : '0.55';
  document.querySelector('.orb-2').style.opacity = isLight ? '0.35' : '0.55';
}

/* ── DATA ───────────────────────────────────────────────── */
const DB_URL = "https://script.google.com/macros/s/AKfycbyCKi3ix9w5uulvq29n8fCRoIXMwv4X2FKQoahDHYScR5kQEn__2He6hmObMgfjXPg/exec";
let qaDatabase = [];
let fuse;

const chatArea  = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn   = document.getElementById('sendBtn');

function now(){
  const d = new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollDown(){ chatArea.scrollTop = chatArea.scrollHeight; }

/* ── RENDER HELPERS ──────────────────────────────────────── */
function showLoader(){
  chatArea.innerHTML = `
    <div class="center-state">
      <div class="spinner"></div>
      <span style="font-size:0.87rem;color:var(--text-dim)">جاري تحميل البيانات…</span>
    </div>`;
}

function showError(msg){
  chatArea.innerHTML = `
    <div class="center-state">
      <div style="width:54px;height:54px;border-radius:18px;
        background:rgba(255,46,120,0.12);border:1px solid rgba(255,46,120,0.25);
        display:flex;align-items:center;justify-content:center;font-size:22px;
        box-shadow:0 0 20px rgba(255,46,120,0.2)">❌</div>
      <p style="font-weight:600;font-size:0.93rem">${msg}</p>
      <button class="retry-btn" onclick="loadData()">
        <i class="fas fa-rotate-right" style="margin-left:7px"></i>إعادة المحاولة
      </button>
    </div>`;
}

function addWelcome(){
  const c = document.createElement('div');
  c.className = 'welcome-card';
  c.innerHTML = `
    <div class="welcome-icon"><i class="fas fa-robot"></i></div>
    <h2>مرحباً بك! 👋</h2>
    <p>أنا مساعدك الذكي، اسألني عن أي شيء وسأجيبك على الفور.</p>`;
  chatArea.appendChild(c);
  scrollDown();
}

function addUserMsg(text){
  const r = document.createElement('div');
  r.className = 'msg-row user';
  r.innerHTML = `
    <div class="msg-av"><i class="fas fa-user"></i></div>
    <div class="bwrap">
      <div class="bubble">${escHtml(text)}</div>
      <div class="bmeta"><span class="msg-time">${now()}</span></div>
    </div>`;
  chatArea.appendChild(r);
  scrollDown();
}

function addBot(text, category){
  const r = document.createElement('div');
  r.className = 'msg-row bot';
  const cat = category
    ? `<span class="cat-tag">${escHtml(category)}</span>` : '';
  r.innerHTML = `
    <div class="msg-av"><i class="fas fa-robot"></i></div>
    <div class="bwrap">
      <div class="bubble">${text}</div>
      <div class="bmeta">${cat}<span class="msg-time">${now()}</span></div>
    </div>`;
  chatArea.appendChild(r);
  scrollDown();
}

function showTyping(){
  const r = document.createElement('div');
  r.id = 'typingRow'; r.className = 'msg-row bot';
  r.innerHTML = `
    <div class="msg-av"><i class="fas fa-robot"></i></div>
    <div class="typing-bub">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  chatArea.appendChild(r); scrollDown();
}

function removeTyping(){
  const el = document.getElementById('typingRow');
  if(el) el.remove();
}

/* ── LOAD ────────────────────────────────────────────────── */
async function loadData(){
  showLoader();
  try{
    const ctrl = new AbortController();
    const tid = setTimeout(()=>ctrl.abort(), 10000);
    const res = await fetch(DB_URL, {redirect:'follow', signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    qaDatabase = JSON.parse(text);
    if(!Array.isArray(qaDatabase)) throw new Error('بيانات غير صالحة');
    // إضافة نسخة مطبَّعة لكل سؤال في قاعدة البيانات
    qaDatabase = qaDatabase.map(item => ({
      ...item,
      _qn: normalizeAr(item.q || '')
    }));

    fuse = new Fuse(qaDatabase, {
      keys: ['_qn'],
      threshold: 0.35,
      distance: 100,
      minMatchCharLength: 2,
      includeScore: true
    });
    chatArea.innerHTML = '';
    addWelcome();
    userInput.disabled = false;
    sendBtn.disabled = false;
    userInput.focus();
  } catch(e){
    const msg = e.name==='AbortError'
      ? 'انتهت مهلة الاتصال، تحقق من الإنترنت'
      : 'تعذّر الاتصال بالخادم';
    showError(msg);
    console.error(e);
  }
}

/* ── تطبيع النص العربي ─────────────────────────────────── */
function normalizeAr(s){
  return s
    .replace(/[ً-ٰٟ]/g, '')   // إزالة التشكيل
    .replace(/[أإآ]/g, 'ا')                  // توحيد الألف
    .replace(/ة/g, 'ه')                       // تاء مربوطة → هاء
    .replace(/ى/g, 'ي')                       // ألف مقصورة → ياء
    .replace(/[\u0600-\u0605\u060C-\u060F\u061B-\u061F\u066A-\u066D\u06D4]/g, '') // علامات ترقيم عربية
    .replace(/[^\u0621-\u063A\u0641-\u064A\u0660-\u0669a-zA-Z0-9 ]/g, '') // حروف عربية وأرقام فقط
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

/* ── SEND ────────────────────────────────────────────────── */
function handleSend(){
  const text = userInput.value.trim();
  if(!text) return;
  addUserMsg(text);
  playSound('sent');
  userInput.value = '';
  showTyping();
  setTimeout(()=>{
    removeTyping();

    if(!fuse){ addBot('جاري التحميل، انتظر لحظة...'); return; }

    const normQuery = normalizeAr(text);

    // 1) بحث مباشر بالنص المطبَّع (أدق)
    const results = fuse.search(normQuery);

    // 2) قبول النتيجة فقط لو درجة تشابهها مقبولة (score أقل = أدق في Fuse)
    const best = results.find(r => r.score !== undefined && r.score <= 0.35);

    if(best){
      addBot(best.item.a, best.item.category);
    } else {
      addBot('عذراً، لا تتوفر إجابة على هذا السؤال حالياً 🤔<br><span style="font-size:0.80rem;opacity:0.6">حاول إعادة صياغة السؤال</span>');
    }
    playSound('received');
  }, 650);
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keypress', e=>{ if(e.key==='Enter') handleSend(); });
window.addEventListener('load', loadData);
</script>
