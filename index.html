<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات بوت - تصحيح الأخطاء</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f6f9; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; height: 90vh; background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        header { background: #0056b3; color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .message.bot { align-self: flex-start; background: #e9ecef; color: #333; }
        .message.user { align-self: flex-end; background: #0056b3; color: white; }
        .debug-info { font-size: 0.75rem; color: #d9534f; margin-top: 5px; border-top: 1px solid #ccc; padding-top: 5px; }
        .category-tag { display: inline-block; font-size: 0.7rem; padding: 2px 6px; background: rgba(0,0,0,0.1); border-radius: 4px; margin-bottom: 5px; font-weight: bold; }
        .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        button { width: 45px; height: 45px; background: #0056b3; color: white; border: none; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2>وضع التصحيح (Debug)</h2>
            <span>سيخبرك بالنتائج المتاحة</span>
        </div>
        <i class="fas fa-bug"></i>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="message bot">جاري التحميل...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." disabled>
        <button id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const DB_URL = "https://script.google.com/macros/s/AKfycbyCKi3ix9w5uulvq29n8fCRoIXMwv4X2FKQoahDHYScR5kQEn__2He6hmObMgfjXPg/exec";

    let qaDatabase = [];
    let fuse;
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    async function loadData() {
        try {
            const response = await fetch(DB_URL);
            const data = await response.json();
            
            qaDatabase = data;
            const fuseOptions = { keys: ['q'], threshold: 0.4 }; // 0.4 = يسمح بـ 40% خطأ
            fuse = new Fuse(qaDatabase, fuseOptions);

            chatArea.innerHTML = '';
            
            // رسالة نجاح التحميل
            addMessage("تم التحميل ✅<br>عدد الأسئلة في الإكسيل: " + qaDatabase.length, 'bot');
            
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        } catch (error) {
            chatArea.innerHTML = '<div class="message bot">فشل التحميل ❌<br>' + error.message + '</div>';
        }
    }

    function addMessage(text, sender, category = null, debugText = null) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        let html = '';
        if (category) html += `<div class="category-tag">${category}</div>`;
        html += text;
        if (debugText) html += `<div class="debug-info">${debugText}</div>`;
        div.innerHTML = html;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function handleSearch() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';

        const results = fuse.search(text);

        if (results.length > 0) {
            // عرض أفضل نتيجة
            const bestMatch = results[0];
            addMessage(bestMatch.item.a, 'bot', bestMatch.item.category, `درجة التطابق: ${(1-bestMatch.score).toFixed(2)} من 1.0`);
        } else {
            // === التعديل الأهم هنا ===
            // إذا لم يجد النتيجة، يعرض قائمة الأسئلة الموجودة
            let allQuestions = qaDatabase.map(item => "• " + item.q).join("<br>");
            let errorHtml = `لم أجد إجابة 😕<br><br>
                             <b>الأسئلة المتوفرة في الإكسيل هي:</b><br>
                             ${allQuestions}`;
            addMessage(errorHtml, 'bot');
        }
    }

    sendBtn.addEventListener('click', handleSearch);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
    window.onload = loadData;
</script>

</body>
</html>
