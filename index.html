<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت الشبكات - متصل بقاعدة بيانات خارجية</title>
    <!-- مكتبة البحث الذكي -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* نفس الستايل السابق */
        :root { --primary: #0056b3; --bg: #f0f2f5; --chat-bg: #ffffff; --user-msg: #0056b3; --bot-msg: #e4e6eb; --text: #1c1e21; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; height: 90vh; background: var(--chat-bg); border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header h2 { margin: 0; font-size: 1.2rem; }
        header span { font-size: 0.8rem; opacity: 0.8; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; position: relative; font-size: 0.95rem; }
        .message.bot { align-self: flex-start; background: var(--bot-msg); color: var(--text); border-bottom-right-radius: 2px; }
        .message.user { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-left-radius: 2px; }
        .category-tag { display: inline-block; font-size: 0.7rem; padding: 2px 8px; background: rgba(0,0,0,0.1); border-radius: 4px; margin-bottom: 5px; color: #555; }
        .message.user .category-tag { background: rgba(255,255,255,0.2); color: white; }
        .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; font-family: inherit; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        button:disabled { background: #ccc; cursor: wait; }
        .loading { font-size: 0.9rem; color: #777; text-align: center; margin: 10px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2>مساعد الشبكات</h2>
            <span>متصل بـ Google Sheets</span>
        </div>
        <div style="font-size: 1.5rem;"><i class="fas fa-database"></i></div>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="message bot">
            جاري تحميل قاعدة البيانات، يرجى الانتظار...
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." disabled>
        <button id="sendBtn" disabled><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // ============================================
    // ضع الرابط الخاص بك هنا
    // ============================================
    const DB_URL = "https://script.google.com/macros/s/AKfycby1EpI8eE4FPf-TEFwtdG0xC92tdtfEtJ0eDghvtHWdGwvqqHzFEJDGk5QTa3QKG-I/exec"; 

    // المتغيرات العامة
    let qaDatabase = []; // سيتم ملؤها من النت
    let fuse; // محرك البحث

    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // ============================================
    // 1. جلب البيانات من Google Sheets
    // ============================================
    async function fetchDatabase() {
        try {
            const response = await fetch(DB_URL);
            const data = await response.json();
            
            // تحديث قاعدة البيانات المحلية
            qaDatabase = data;

            // تهيئة Fuse.js بالبيانات الجديدة
            const fuseOptions = {
                keys: ['q'],
                threshold: 0.4 // نفس درجة التسامح مع الأخطاء
            };
            fuse = new Fuse(qaDatabase, fuseOptions);

            // تفعيل الشات
            chatArea.innerHTML = '';
            addMessage("تم تحميل قاعدة البيانات بنجاح! ✅<br>يمكنك الآن السؤال عن أي إعداد للسويتش.", 'bot');
            userInput.disabled = false;
            sendBtn.disabled = false;

        } catch (error) {
            console.error(error);
            chatArea.innerHTML = `<div class="message bot" style="color:red">فشل تحميل البيانات.<br>تأكد من الرابط وأنك اخترت "Anyone" في إعدادات النشر.<br>الخطأ: ${error.message}</div>`;
        }
    }

    // ============================================
    // 2. وظائف الواجهة
    // ============================================
    function addMessage(text, sender, category = null) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        let html = '';
        if (category) html += `<div class="category-tag">${category}</div>`;
        html += text;
        div.innerHTML = html;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function handleSearch() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';

        const results = fuse.search(text);

        if (results.length > 0) {
            if (results[0].score < 0.5) {
                const answer = results[0].item.a;
                const cat = results[0].item.category;
                addMessage(answer, 'bot', cat);
            } else {
                addMessage("لم أجد إجابة قريبة، حاول صياغة السؤال بشكل آخر.", 'bot');
            }
        } else {
            addMessage("عذراً، هذا السؤال غير موجود في قاعدة البيانات.", 'bot');
        }
    }

    // ============================================
    // 3. التشغيل
    // ============================================
    sendBtn.addEventListener('click', handleSearch);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });

    // استدعاء الدالة عند فتح الصفحة
    window.onload = fetchDatabase;

</script>

</body>
</html>
